*{ box-sizing: border-box; }
html,body{ margin:0; padding:0; }
body{ background: var(--paper); color: var(--ink); font-family: var(--font-body); min-height: 100vh; }
h1,h2,h3,h4{ font-family: var(--font-display); font-weight: 600; color: var(--green-deep); margin: 0 0 .4em; }
button{ font-family: var(--font-body); cursor:pointer; }
.app{ max-width: 980px; margin: 0 auto; padding: 20px 16px 60px; }
.topbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom: 18px; flex-wrap:wrap; }
.brand{ display:flex; align-items:center; gap:10px; }
.brand h1{ font-size: 1.6rem; margin:0; font-family: "Bree Serif", var(--font-display); font-weight:400; }
.brand span{ font-size:.8rem; color: var(--ink-soft); display:block; }
.icon-btn{ border: 1px solid var(--line); background: var(--paper-dark); color: var(--ink); border-radius: 10px; padding: 8px 12px; font-size: .85rem; }
.icon-btn:hover{ background: var(--green-light); }
.icon-btn.icon-only{ padding: 8px 11px; font-size: 1.2rem; line-height:1; }
.card .icon-only{ align-self:flex-start; }
.card-actions{ display:flex; gap:6px; }
.toolbar{ display:flex; gap:10px; margin-bottom: 18px; flex-wrap: wrap; }
.toolbar input[type=search], .toolbar select{ border: 1px solid var(--line); background: #fff; padding: 9px 12px; border-radius: 10px; font-size: .9rem; color: var(--ink); font-family: var(--font-body); }
.toolbar input[type=search]{ flex: 1; min-width: 160px; }
.section-label{ font-family: var(--font-display); color: var(--ink-soft); font-size: .85rem; margin: 18px 0 8px; text-transform: uppercase; letter-spacing: .04em; }
.grid{ display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 12px; }
.card{ background: #fffdf8; border: 1px solid var(--line); border-radius: 16px; padding: 10px; box-shadow: 0 3px 10px var(--shadow); cursor: pointer; transition: transform .15s ease; position: relative; display:flex; flex-direction:column; gap:6px; }
.card:hover{ transform: translateY(-2px); }
.card svg{ width:100%; height:90px; display:block; }
.card .plant-photo{ width:100%; height:90px; object-fit:cover; border-radius:10px; display:block; }
.card .name{ font-family: var(--font-display); font-weight:600; font-size: .92rem; color: var(--green-deep); }
.card .sci{ font-style: italic; font-size: .72rem; color: var(--ink-soft); }
.badge{ position:absolute; top:8px; right:8px; width:11px; height:11px; border-radius:50%; border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,.1); }
.badge.ok{ background: var(--green); } .badge.soon{ background: var(--amber); } .badge.now{ background: var(--red); }
.riego-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:18px; }
.riego-row{ display:flex; align-items:center; gap:10px; background:#fff; border:1px solid var(--line); border-radius:10px; padding:10px 14px; cursor:pointer; }
.riego-row.checked{ opacity:.6; }
.riego-check{ width:18px; height:18px; flex-shrink:0; }
.riego-dot{ width:11px; height:11px; border-radius:50%; flex-shrink:0; }
.riego-dot.ok{ background: var(--green); } .riego-dot.soon{ background: var(--amber); } .riego-dot.now{ background: var(--red); }
.riego-name{ font-family: var(--font-display); font-weight:600; color: var(--green-deep); }
.detail{ background:#fffdf8; border:1px solid var(--line); border-radius: 18px; padding: 22px; box-shadow: 0 4px 16px var(--shadow); }
.detail-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
.detail-title h2{ font-size:1.6rem; margin-bottom:2px; }
.detail-title .sci{ font-style: italic; color: var(--ink-soft); }
.title-edit{ border:1px solid transparent; background:none; border-radius:6px; padding:2px 4px; margin:0 -4px; font-family:var(--font-display); color: var(--green-deep); }
.title-edit:hover{ border-color: var(--line); }
.title-edit:focus{ outline:none; border-color: var(--green); background:#fff; }
.name-edit{ font-size:1.6rem; font-weight:600; width:100%; margin-bottom:2px; }
.sci-edit-row{ display:flex; align-items:center; flex-wrap:wrap; gap:6px; color: var(--ink-soft); }
.sci-edit{ display:inline-block; font-style: italic; color: var(--ink-soft); font-size:1rem; white-space:pre; }
.sci-edit:empty::before{ content: attr(data-placeholder); opacity:.65; }
.familia-label{ font-size:1rem; font-style:italic; }
.grupo-edit-row{ display:flex; align-items:center; gap:8px; margin-top:6px; }
.grupo-edit-row .familia-label{ font-size:.85rem; }
.grupo-select{ font-family:var(--font-body); border:1px solid var(--line); border-radius:8px; padding:5px 8px; font-size:.85rem; color:var(--ink); background:#fff; }
.grupo-view{ font-size:.8rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.04em; margin-top:4px; }
.detail-actions{ display:flex; gap:8px; flex-wrap:wrap; }
.tabs{ display:flex; gap:4px; margin: 18px 0 16px; border-bottom: 2px solid var(--line); }
.tab{ border:none; background:none; padding: 8px 16px; font-size: .95rem; color: var(--ink-soft); border-bottom: 3px solid transparent; margin-bottom:-2px; font-family: var(--font-display); font-weight:600; }
.tab.active{ color: var(--green-deep); border-color: var(--green); }
.illustration-wrap{ position: relative; max-width: 380px; margin: 0 auto 20px; }
.illustration-wrap svg{ width:100%; display:block; }
.illustration-wrap .plant-photo{ width:100%; max-height:320px; object-fit:cover; border-radius:14px; display:block; }
.marker{ position:absolute; width:20px; height:20px; border-radius:50%; background: rgba(181,101,74,0.85); border: 2px solid #fff; color:#fff; font-size:.7rem; display:flex; align-items:center; justify-content:center; transform: translate(-50%,-50%); box-shadow: 0 2px 5px rgba(0,0,0,.3); }
.marker-card{ position:absolute; background:#fff; border:1px solid var(--line); border-radius:10px; padding:10px 12px; max-width:220px; font-size:.82rem; box-shadow:0 4px 14px rgba(0,0,0,.2); z-index:10; }
.sections{ display:flex; flex-direction:column; gap:14px; }
.section{ border-top: 1px solid var(--line); padding-top: 12px; }
.section h4{ display:flex; align-items:center; gap:8px; font-size:1.3rem; font-family: var(--font-heading); letter-spacing:.03em; font-weight:400; }
.section p, .section li{ font-size:.9rem; line-height:1.5; color: var(--ink); }
.mix-list{ list-style:none; padding:0; margin: 6px 0; }
.mix-list li{ display:flex; gap:8px; padding: 3px 0; }
.mix-list .parts{ font-weight:700; color: var(--green-deep); min-width: 65px; }
.pest{ margin-bottom:8px; }
.pest b{ color: var(--terracotta); }
.watering-box{ display:flex; align-items:center; gap:10px; background: var(--paper-dark); border-radius: 12px; padding: 12px 14px; margin: 14px 0; flex-wrap:wrap; }
.login-wrap{ max-width:380px; margin:15vh auto 0; text-align:center; padding:0 20px; }
.login-wrap h1{ font-family:"Bree Serif", var(--font-display); font-size:1.8rem; }
.login-wrap p{ color: var(--ink-soft); margin-bottom:20px; }
.login-wrap .save{ font-size:1rem; padding:12px 24px; border:none; background: var(--terracotta); color:#fff; border-radius:8px; cursor:pointer; }
.watering-box .dot{ width:14px; height:14px; border-radius:50%; flex-shrink:0; }
.watering-box button{ margin-left:auto; border:1px solid var(--green); background:var(--green); color:#fff; border-radius:8px; padding:7px 12px; font-size:.85rem; }
.diary-form{ display:flex; flex-direction:column; gap:8px; margin-bottom:18px; }
.diary-form textarea{ font-family:var(--font-body); border:1px solid var(--line); border-radius:10px; padding:10px; font-size:.9rem; resize:vertical; min-height:60px; }
.diary-form label{ font-size:.85rem; color:var(--ink-soft); }
.diary-form input[type=text]{ font-family:var(--font-body); border:1px solid var(--line); border-radius:10px; padding:10px; font-size:.9rem; }
.ficha-field{ width:100%; font-family:var(--font-body); border:1px solid var(--line); border-radius:10px; padding:10px; font-size:.9rem; resize:vertical; min-height:56px; background:#fffefb; color:var(--ink); }
.ficha-field::placeholder{ color:var(--ink-soft); font-style:italic; }
.rich-toolbar{ display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; align-items:center; }
.rich-toolbar select, .rich-toolbar button, .rich-toolbar input[type=color]{ font-family:var(--font-body); font-size:.72rem; border:1px solid var(--line); background:#fff; border-radius:6px; padding:3px 6px; color:var(--ink); cursor:pointer; }
.rich-toolbar button{ min-width:28px; }
.rich-toolbar input[type=color]{ padding:2px; width:30px; height:26px; }
.rich-toolbar select{ max-width:92px; }
.rt-icon-btn{ display:flex; align-items:center; justify-content:center; }
.rt-apply-all{ font-size:.68rem !important; white-space:nowrap; }
.rich-editable{ width:100%; font-family:Arial, Helvetica, sans-serif; border:1px solid var(--line); border-radius:10px; padding:10px; font-size:.9rem; min-height:56px; background:#fffefb; color:var(--ink); }
.rich-editable:empty::before{ content: attr(data-placeholder); color:var(--ink-soft); font-style:italic; }
.rich-editable:focus{ outline:none; border-color:var(--green); }
.rich-editable ul, .rich-editable ol, .section-view ul, .section-view ol{ margin:.3em 0; padding-left:22px; }
.section-view{ margin:0; font-family:Arial, Helvetica, sans-serif; }
.section-view p{ margin:0 0 .5em; }
.clima-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-bottom:12px; }
.clima-card{ background: var(--paper-dark); border-radius:12px; padding:10px 6px; text-align:center; display:flex; flex-direction:column; gap:4px; align-items:center; }
.clima-card-label{ font-size:.68rem; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); }
.clima-sublabel{ font-size:.68rem; color:var(--ink-soft); margin-top:2px; }
.clima-card-value{ font-size:1.05rem; font-weight:600; color:var(--green-deep); word-break:break-word; }
.clima-card-value.small{ font-size:.82rem; font-weight:500; }
.clima-input{ width:100%; text-align:center; border:1px solid var(--line); border-radius:8px; padding:6px 4px; font-size:.85rem; font-family:var(--font-body); background:#fff; color:var(--ink); }
.section-photo-row{ margin-bottom:10px; }
.section-photo{ max-width:100%; max-height:420px; width:auto; height:auto; object-fit:contain; border-radius:12px; display:block; margin:0 auto 8px; }
.section-photo-actions{ display:flex; gap:6px; }
.foto-hint{ font-size:.72rem; color:var(--ink-soft); margin:6px 0 0; }
.diary-photos-row{ display:flex; align-items:center; gap:8px; }
.diary-photo-previews{ display:flex; flex-wrap:wrap; gap:8px; }
.diary-photo-previews:empty{ display:none; }
.photo-preview{ position:relative; width:64px; height:64px; display:block; }
.photo-preview img{ width:100%; height:100%; object-fit:cover; border-radius:8px; display:block; }
.photo-preview-remove{ position:absolute; top:-6px; right:-6px; width:20px; height:20px; border-radius:50%; border:1px solid var(--line); background:#fff; color:var(--red); font-size:.9rem; line-height:1; padding:0; cursor:pointer; }
.entry-photos{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.entry-photo-thumb{ width:56px; height:56px; object-fit:cover; border-radius:8px; cursor:zoom-in; }
.photo-lightbox{ position:fixed; inset:0; background:rgba(20,16,10,.85); display:flex; align-items:center; justify-content:center; z-index:1000; cursor:zoom-out; padding:20px; }
.photo-lightbox img{ max-width:92vw; max-height:92vh; border-radius:10px; box-shadow:0 8px 30px rgba(0,0,0,.4); }
.tag-row{ display:flex; gap:6px; flex-wrap:wrap; }
.tag-btn{ border:1px solid var(--line); background:#fff; border-radius:20px; padding:5px 12px; font-size:.78rem; color: var(--ink-soft); }
.tag-btn.selected{ background: var(--green); color:#fff; border-color:var(--green); }
.diary-form .save{ align-self:flex-start; border:none; background: var(--terracotta); color:#fff; border-radius:8px; padding:8px 16px; font-size:.85rem; }
.entry{ border-left: 3px solid var(--green-light); padding: 6px 0 6px 12px; margin-bottom:10px; }
.entry .meta{ font-size:.75rem; color: var(--ink-soft); display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.entry .txt{ font-size:.9rem; margin-top:2px; }
.entry .del{ border:none; background:none; color: var(--red); font-size:.75rem; padding:0; margin-left:8px; }
.entry-tag{ background: var(--paper-dark); border-radius:8px; padding:1px 8px; font-size:.7rem; }
.empty-diary{ color: var(--ink-soft); font-style: italic; font-size:.9rem; }
.hidden{ display:none !important; }
.no-results{ color: var(--ink-soft); font-style: italic; padding: 20px; text-align:center; }
.fert-badge{ position:absolute; top:8px; left:8px; font-size:1rem; filter: drop-shadow(0 1px 1px rgba(0,0,0,.3)); }
.cal-grid{ display:grid; grid-template-columns: repeat(7,1fr); gap:4px; margin: 14px 0; }
.cal-head{ text-align:center; font-size:.72rem; color:var(--ink-soft); font-weight:600; }
.cal-cell{ min-height:52px; border:1px solid var(--line); border-radius:8px; padding:4px; background:#fffdf8; cursor:pointer; position:relative; }
.cal-cell.empty{ border:none; background:none; cursor:default; }
.cal-cell.selected{ border-color: var(--green); box-shadow:0 0 0 2px var(--green-light); }
.cal-cell.has-entries{ background: var(--paper-dark); }
.cal-cell.today .cal-day-num{ color: var(--terracotta); font-weight:700; }
.cal-day-num{ font-size:.72rem; color:var(--ink-soft); }
.cal-dots{ display:flex; gap:2px; flex-wrap:wrap; margin-top:4px; }
.cal-dot{ width:6px; height:6px; border-radius:50%; }
.cal-dot-predicted{ background:none !important; border:2px solid; box-sizing:border-box; }
.entry.predicted{ border-left-color: var(--ink-soft); opacity:.85; }
.cal-day-detail{ margin-top:16px; border-top:1px solid var(--line); padding-top:12px; }
.cal-legend{ display:flex; gap:10px; flex-wrap:wrap; font-size:.72rem; color:var(--ink-soft); margin-bottom:10px; }
.cal-legend span{ display:inline-flex; align-items:center; gap:4px; }
.cal-legend .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }
@media print{
  body{ background: #fff; }
  .topbar, .toolbar, .grid, .tabs, .detail-actions, .diary-form, .watering-box button, .section-label{ display:none !important; }
  @page{ size: A4; margin: 18mm 20mm; }
  .app{ max-width: none; padding:0; }
  .detail{ box-shadow:none; border:none; }
  .section, .pest{ break-inside: avoid; }
  body{ font-size: 11.5pt; line-height: 1.45; }
}
@media (max-width: 600px){ .detail{ padding:16px; } .detail-title h2{ font-size:1.3rem; } }

/* =========================================================
   Ilustraciones SVG estilo acuarela
   ========================================================= */
function rnd(seed){ const x = Math.sin(seed*999.7)*10000; return x - Math.floor(x); }
function svgDefs(id,a,b,c){
  return `<filter id="wash-${id}" x="-40%" y="-40%" width="180%" height="180%">
    <feTurbulence type="fractalNoise" baseFrequency="0.01 0.025" numOctaves="2" seed="${id.length+1}" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="6"/>
    <feGaussianBlur stdDeviation="1.6"/>
  </filter>
  <radialGradient id="grad-${id}" cx="50%" cy="35%" r="65%">
    <stop offset="0%" stop-color="${b}" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="${b}" stop-opacity="0"/>
  </radialGradient>`;
}
function pointedLeaf(l,w){ return `M0,0 C${w},${-l*0.12} ${w*0.95},${-l*0.62} 0,${-l} C${-w*0.95},${-l*0.62} ${-w},${-l*0.12} 0,0 Z`; }
function heartLeaf(l,w){ return `M0,0 C${-w*0.55},${-l*0.05} ${-w*1.05},${-l*0.28} ${-w*0.65},${-l*0.48} C${-w*0.3},${-l*0.78} ${-w*0.08},${-l*0.92} 0,${-l} C${w*0.08},${-l*0.92} ${w*0.3},${-l*0.78} ${w*0.65},${-l*0.48} C${w*1.05},${-l*0.28} ${w*0.55},${-l*0.05} 0,0 Z`; }
function paddleLeaf(l,w){ return `M0,0 C${w*1.1},${-l*0.22} ${w*1.15},${-l*0.75} ${w*0.32},${-l*0.98} C${w*0.12},${-l*1.06} ${-w*0.12},${-l*1.06} ${-w*0.32},${-l*0.98} C${-w*1.15},${-l*0.75} ${-w*1.1},${-l*0.22} 0,0 Z`; }
function ovalLeaf(l,w){ return `M0,0 C${w},${-l*0.1} ${w*0.9},${-l*0.7} 0,${-l} C${-w*0.9},${-l*0.7} ${-w},${-l*0.1} 0,0 Z`; }
function leafG(x,y,ang,l,w,d,fill,op,stroke){ return `<g transform="translate(${x},${y}) rotate(${ang})"><path d="${d(l,w)}" fill="${fill}" opacity="${op}" stroke="${stroke}" stroke-width="0.6" stroke-opacity="0.35"/></g>`; }

function renderIllustration(p){
  const {a,b,c} = p.palette; const id = p.id; let body = "";
  switch(p.shape){
    case "corona-tronco": {
      body += `<path d="M100,205 C97,170 96,140 99,100 C100,95 102,95 103,100 C105,140 104,170 101,205 Z" fill="${c}" opacity="0.55"/>`;
      for(let i=0;i<11;i++){
        const t=i/10, ang=-70+t*140+(rnd(i)-0.5)*6, len=55+rnd(i+10)*20;
        body += leafG(101,100,ang,len,6,pointedLeaf,a,0.82,c);
        body += `<g transform="translate(101,100) rotate(${ang})"><path d="${pointedLeaf(len,6)}" fill="none" stroke="${b}" stroke-width="1" opacity="0.5"/></g>`;
      }
      break; }
    case "rastrera-mosaico": {
      body += `<ellipse cx="100" cy="150" rx="70" ry="18" fill="${a}" opacity="0.1"/>`;
      const pos=[[45,140,-10],[65,120,15],[88,145,-25],[60,160,30],[100,110,5],[118,135,-15],[135,155,20],[100,165,-30],[80,100,10],[130,110,-5]];
      pos.forEach((pp,i)=>{ const [x,y,ang]=pp, len=18+rnd(i)*6, wid=11+rnd(i+5)*3;
        body += `<g transform="translate(${x},${y}) rotate(${ang})"><path d="${pointedLeaf(len,wid)}" transform="translate(0,${len*0.5})" fill="${a}" opacity="0.85"/><line x1="0" y1="${len*0.5}" x2="0" y2="${-len*0.4}" stroke="${b}" stroke-width="1" opacity="0.7"/></g>`;
      });
      break; }
    case "roseta-suculenta": {
      body += `<path d="M96,205 C95,185 97,165 100,150 C103,165 105,185 104,205 Z" fill="${c}" opacity="0.6"/>`;
      for(let i=0;i<14;i++){ const ang=(i/14)*360, len=26+(i%3)*3;
        body += leafG(100,150,ang,len,9,paddleLeaf,a,0.8,c);
      }
      body += `<circle cx="100" cy="150" r="6" fill="${b}" opacity="0.4"/>`;
      break; }
    case "trepadora-corazon": {
      const path=`M100,15 C70,45 130,75 90,105 C60,130 125,150 95,180 C75,198 105,205 100,208`;
      body += `<path d="${path}" stroke="${c}" stroke-width="3" fill="none" opacity="0.55"/>`;
      const stops=[[100,15],[95,55],[100,90],[92,125],[100,160],[96,195]];
      stops.forEach((pp,i)=>{ const [x,y]=pp, ang=(i%2===0?35:-35)+(rnd(i)-0.5)*10, len=26+rnd(i+2)*10;
        body += leafG(x,y,ang,len,len*0.68,heartLeaf,a,0.85,c);
        const rad=ang*Math.PI/180, vx=x+len*0.4*Math.sin(rad), vy=y-len*0.4*Math.cos(rad);
        body += `<ellipse cx="${vx}" cy="${vy}" rx="${len*0.14}" ry="${len*0.09}" fill="${b}" opacity="0.5" transform="rotate(${ang} ${vx} ${vy})"/>`;
      });
      break; }
    case "raiz-roseta": {
      body += `<path d="M100,205 C82,205 80,178 89,158 C94,149 106,149 111,158 C120,178 118,205 100,205 Z" fill="${b}" opacity="0.85"/>`;
      for(let i=0;i<7;i++){ const ang=-75+i*(150/6)+(rnd(i)-0.5)*8, len=40+rnd(i+4)*14;
        body += leafG(100,152,ang,len,8,pointedLeaf,a,0.82,c);
      }
      break; }
    case "arbusto-agujas": {
      body += `<path d="M100,205 C99,180 100,160 100,150" stroke="${c}" stroke-width="3" opacity="0.7" fill="none"/>`;
      const br=[[100,150,-55,50],[100,150,-25,62],[100,150,10,66],[100,150,40,54],[100,150,65,44],[100,150,-75,36]];
      br.forEach((bb,bi)=>{ const [bx,by,bang,blen]=bb, rad=bang*Math.PI/180, ex=bx+blen*Math.sin(rad), ey=by-blen*Math.cos(rad);
        body += `<path d="M${bx},${by} Q${(bx+ex)/2+7*Math.cos(rad)},${(by+ey)/2} ${ex},${ey}" stroke="${c}" stroke-width="1.4" fill="none" opacity="0.6"/>`;
        for(let k=0;k<8;k++){ const t=k/7, px=bx+(ex-bx)*t, py=by+(ey-by)*t, side=k%2===0?1:-1, nlen=8+rnd(bi*10+k)*4, nang=bang+side*55, nrad=nang*Math.PI/180, tx=px+nlen*Math.sin(nrad), ty=py-nlen*Math.cos(nrad);
          body += `<line x1="${px}" y1="${py}" x2="${tx}" y2="${ty}" stroke="${a}" stroke-width="1.6" opacity="0.75"/>`;
        }
        if(bi%2===0) body += `<circle cx="${ex}" cy="${ey}" r="2.2" fill="${b}" opacity="0.75"/>`;
      });
      break; }
    case "hojas-verticales": {
      body += `<ellipse cx="100" cy="200" rx="16" ry="8" fill="${b}" opacity="0.5"/>`;
      for(let i=0;i<9;i++){ const t=i/8, ang=-30+t*60+(rnd(i)-0.5)*6, len=90+rnd(i+3)*40;
        const rad=ang*Math.PI/180, ex=100+len*0.15*Math.sin(rad), ey=200-len;
        body += `<path d="M100,200 Q${100+len*0.1*Math.sin(rad)},${200-len*0.5} ${ex},${ey}" stroke="${a}" stroke-width="${4+rnd(i)*2}" fill="none" opacity="0.8" stroke-linecap="round"/>`;
      }
      break; }
    case "roseta-hojas-anchas": {
      body += `<ellipse cx="100" cy="195" rx="60" ry="14" fill="${a}" opacity="0.12"/>`;
      for(let i=0;i<10;i++){ const ang=(i/10)*360+(rnd(i)-0.5)*10, len=45+rnd(i+2)*20, wid=len*0.6;
        body += leafG(100,175,ang,len,wid,ovalLeaf,i%3===0?b:a,0.82,c);
      }
      break; }
    case "matorral-tallos": {
      for(let i=0;i<6;i++){ const bx=70+i*12+rnd(i)*8, len=90+rnd(i+1)*60;
        body += `<path d="M${bx},205 Q${bx+rnd(i+5)*10-5},${205-len*0.5} ${bx+rnd(i+8)*14-7},${205-len}" stroke="${c}" stroke-width="2" fill="none" opacity="0.6"/>`;
        for(let k=0;k<7;k++){ const t=k/6, px=bx+t*(rnd(i+8)*14-7), py=205-t*len, side=k%2===0?1:-1, ang=side*50;
          body += leafG(px,py,ang,16+rnd(i*7+k)*6,10,ovalLeaf,a,0.8,c);
        }
      }
      break; }
    case "racimo-frutos": {
      body += `<path d="M100,205 C99,170 100,140 100,120" stroke="${c}" stroke-width="3" opacity="0.7" fill="none"/>`;
      for(let i=0;i<5;i++){ const y=190-i*22, side=i%2===0?1:-1, ang=side*45;
        body += leafG(100,y,ang,32,20,ovalLeaf,a,0.8,c);
      }
      for(let i=0;i<6;i++){ const ang2=(i/6)*360, rx=100+18*Math.sin(ang2*Math.PI/180), ry=100+18*Math.cos(ang2*Math.PI/180)*0.5+70;
        body += `<circle cx="${rx}" cy="${ry}" r="6" fill="${b}" opacity="0.85"/>`;
      }
      break; }
    case "hoja-grande-flor": {
      body += leafG(100,175,0,85,80,ovalLeaf,a,0.8,c);
      body += leafG(75,180,-30,60,55,ovalLeaf,a,0.75,c);
      body += leafG(125,180,30,60,55,ovalLeaf,a,0.75,c);
      body += `<circle cx="100" cy="110" r="10" fill="${b}" opacity="0.9"/>`;
      for(let i=0;i<5;i++){ const ang3=(i/5)*360*Math.PI/180;
        body += `<ellipse cx="${100+14*Math.sin(ang3)}" cy="${110-14*Math.cos(ang3)}" rx="6" ry="10" fill="${b}" opacity="0.7" transform="rotate(${i*72} ${100+14*Math.sin(ang3)} ${110-14*Math.cos(ang3)})"/>`;
      }
      break; }
    default: body = `<circle cx="100" cy="120" r="40" fill="${a}" opacity="0.7"/>`;
  }
  return `<svg viewBox="0 0 200 215" xmlns="http://www.w3.org/2000/svg">
    <defs>${svgDefs(id,a,b,c)}</defs>
    <ellipse cx="100" cy="205" rx="55" ry="8" fill="${c}" opacity="0.1"/>
    <circle cx="100" cy="100" r="95" fill="url(#grad-${id})"/>
    <g filter="url(#wash-${id})">${body}</g>
  </svg>`;
}
function renderPlantVisual(p){
  if(p.foto) return `<img src="${p.foto}" alt="${p.nombreComun}" class="plant-photo">`;
  return renderIllustration(p);
}

const PHOTO_ACCEPT = "image/jpeg,image/png,image/gif,image/webp";
const PHOTO_FORMATS_HINT = "Formatos admitidos: JPG, PNG, GIF, WEBP.";
function readImageCompressed(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    if(!file.type || !file.type.startsWith("image/")){
      reject(new Error(`Ese archivo no es una imagen compatible. ${PHOTO_FORMATS_HINT}`));
      return;
    }
    const reader = new FileReader();
    reader.onerror = ()=> reject(new Error("No se ha podido leer el archivo."));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=> reject(new Error(`No se ha podido abrir la imagen. ${PHOTO_FORMATS_HINT}`));
      img.onload = ()=>{
        let w = img.naturalWidth, h = img.naturalHeight;
        if(w > maxDim || h > maxDim){
          if(w >= h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderPhotoPreviews(prefix, photos){
  const el = document.getElementById(`${prefix}-photo-previews`);
  if(!el) return;
  el.innerHTML = photos.map((src,i)=>`<span class="photo-preview"><img src="${src}"><button type="button" class="photo-preview-remove" data-idx="${i}" aria-label="Quitar foto">×</button></span>`).join("");
  el.querySelectorAll(".photo-preview-remove").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      photos.splice(parseInt(btn.dataset.idx),1);
      renderPhotoPreviews(prefix, photos);
    });
  });
}
function bindPhotoPicker(prefix, photos){
  const btn = document.getElementById(`${prefix}-photo-btn`);
  const input = document.getElementById(`${prefix}-photo-file`);
  if(!btn || !input) return;
  btn.addEventListener("click", ()=> input.click());
  input.addEventListener("change", (e)=>{
    const files = Array.from(e.target.files);
    e.target.value = "";
    if(!files.length) return;
    Promise.all(files.map(f=> readImageCompressed(f, 1000, 0.8).catch(err=>{ alert(err.message || "No se ha podido procesar una imagen."); return null; })))
      .then(results=>{
        results.forEach(r=>{ if(r) photos.push(r); });
        renderPhotoPreviews(prefix, photos);
      });
  });
}

let rtSavedRange = null;
function rtSaveSelection(){
  const sel = window.getSelection();
  if(sel.rangeCount>0) rtSavedRange = sel.getRangeAt(0).cloneRange();
}
function rtRestoreSelection(){
  if(rtSavedRange){
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(rtSavedRange);
  }
}
function bindRichToolbars(scopeEl){
  scopeEl.querySelectorAll(".rich-toolbar").forEach(toolbar=>{
    const target = document.getElementById(toolbar.dataset.target);
    if(!target) return;
    const justifyCmds = ["justifyLeft","justifyCenter","justifyRight","justifyFull"];
    toolbar.querySelectorAll("button[data-cmd]").forEach(btn=>{
      btn.addEventListener("mousedown", e=> e.preventDefault());
      btn.addEventListener("click", ()=>{
        target.focus();
        try{ document.execCommand("styleWithCSS", false, true); }catch(e){}
        if(justifyCmds.includes(btn.dataset.cmd)){
          const sel = window.getSelection();
          if(!sel.rangeCount || sel.getRangeAt(0).collapsed){
            const range = document.createRange();
            range.selectNodeContents(target);
            sel.removeAllRanges();
            sel.addRange(range);
          }
        }
        document.execCommand(btn.dataset.cmd, false, null);
      });
    });
    const sizeSel = toolbar.querySelector(".rt-size");
    if(sizeSel){
      sizeSel.addEventListener("mousedown", rtSaveSelection);
      sizeSel.addEventListener("change", ()=>{
        if(!sizeSel.value) return;
        target.focus(); rtRestoreSelection();
        document.execCommand("fontSize", false, sizeSel.value);
        sizeSel.value = "";
      });
    }
    const colorInput = toolbar.querySelector(".rt-color");
    if(colorInput){
      colorInput.addEventListener("mousedown", rtSaveSelection);
      colorInput.addEventListener("input", ()=>{
        target.focus(); rtRestoreSelection();
        document.execCommand("foreColor", false, colorInput.value);
      });
    }
  });
}

  return {

    nombreCientifico: f.nombreCientifico !== undefined ? f.nombreCientifico : p.nombreCientifico,

function allPlants(){
  const deleted = getDeletedPlants();
  const customPlants = getCustomPlants();
  const knownIds = new Set(PLANTS.map(p=>p.id).concat(customPlants.map(p=>p.id)));

  const id = `nueva-${slug || "planta"}-${Date.now()}`;

    palette:{a:"#7a8b5c", b:"#a8b98a", c:"#4a5d3a"}, shape:"generica",

  };

/* --- Backup: exportar/importar todo localStorage --- */
async function exportData(){
  if(!fb || !currentUser){ alert("Necesitas haber iniciado sesión para exportar tus datos."); return; }
  try{
    const uid = currentUser.uid;
    const db = firebase.firestore();

    const fichasSnap = await db.collection("usuarios").doc(uid).collection("fichas").get();
    const fichas = {};
    fichasSnap.forEach(doc=>{ fichas[doc.id] = doc.data(); });

    const customSnap = await db.collection("usuarios").doc(uid).collection("plantasPersonalizadas").get();
    const plantasPersonalizadas = {};
    customSnap.forEach(doc=>{ plantasPersonalizadas[doc.id] = doc.data(); });

    const riegoSnap = await db.collection("usuarios").doc(uid).collection("riego").get();
    const riego = {};
    riegoSnap.forEach(doc=>{ riego[doc.id] = doc.data(); });

    const entriesSnap = await db.collectionGroup("entries").get();
    const diario = {};
    entriesSnap.forEach(doc=>{
      const plantRef = doc.ref.parent.parent;
      const ownerUid = plantRef && plantRef.parent && plantRef.parent.parent ? plantRef.parent.parent.id : null;
      if(!plantRef || ownerUid!==uid) return;
      if(!diario[plantRef.id]) diario[plantRef.id] = {};
      diario[plantRef.id][doc.id] = doc.data();
    });

    const backup = {app:"lhortapp", version:2, exportedAt:new Date().toISOString(), uid, fichas, plantasPersonalizadas, riego, diario};

    if(isAdmin()){
      const oficialSnap = await db.collection("plantasOficiales").get();
      const plantasOficiales = {};
      oficialSnap.forEach(doc=>{ plantasOficiales[doc.id] = doc.data(); });
      const plagasSnap = await db.collection("plagas").get();
      const plagas = {};
      plagasSnap.forEach(doc=>{ plagas[doc.id] = doc.data(); });
      const tratamientosSnap = await db.collection("tratamientos").get();
      const tratamientos = {};
      tratamientosSnap.forEach(doc=>{ tratamientos[doc.id] = doc.data(); });
      const eliminadasSnap = await db.collection("plantasEliminadas").get();
      const plantasEliminadas = {};
      eliminadasSnap.forEach(doc=>{ plantasEliminadas[doc.id] = true; });
      backup.oficial = {plantasOficiales, plagas, tratamientos, plantasEliminadas};
    }

    const totalPropios = Object.keys(fichas).length + Object.keys(plantasPersonalizadas).length + Object.keys(riego).length + Object.keys(diario).length;
    if(totalPropios===0 && !backup.oficial){
      alert("Todavía no tienes ningún dato guardado (ninguna ficha, diario o riego). Escribe algo primero y luego podrás exportarlo.");
      return;
    }

    const filename = `lhortapp-backup-${new Date().toISOString().slice(0,10)}.json`;
    const blob = new Blob([JSON.stringify(backup,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    alert(`Backup descargado como "${filename}" (revisa tu carpeta de Descargas).`);
  }catch(err){
    alert("No se ha podido generar la copia de seguridad: " + (err.message||err));
  }
}
function importDataFromFile(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    let backup;
    try{ backup = JSON.parse(reader.result); }
    catch(e){ alert("Este archivo no es un backup válido de l'HortApp (no es un JSON legible)."); return; }
    if(!backup || backup.app!=="lhortapp"){ alert("Este archivo no es un backup válido de l'HortApp."); return; }
    const fecha = backup.exportedAt ? new Date(backup.exportedAt).toLocaleDateString("es-ES") : "fecha desconocida";

    if(backup.fichas || backup.plantasPersonalizadas || backup.riego || backup.diario || backup.oficial){
      if(!fb || !currentUser){ alert("Necesitas haber iniciado sesión para restaurar datos."); return; }
      const numFichas = Object.keys(backup.fichas||{}).length;
      const numCustom = Object.keys(backup.plantasPersonalizadas||{}).length;
      const numRiego = Object.keys(backup.riego||{}).length;
      const numDiario = Object.values(backup.diario||{}).reduce((sum,entries)=> sum+Object.keys(entries).length, 0);
      const avisoOficial = (isAdmin() && backup.oficial) ? " Incluye también el catálogo oficial completo (plantas, plagas y tratamientos)." : "";
      if(!confirm(`Vas a restaurar un backup del ${fecha} (${numFichas} fichas, ${numCustom} plantas propias, ${numRiego} riegos, ${numDiario} entradas de diario).${avisoOficial} Esto sobrescribirá tus datos actuales con estos. ¿Continuar?`)) return;

      const uid = currentUser.uid;
      const db = firebase.firestore();
      const writes = [];
      Object.entries(backup.fichas||{}).forEach(([id,data])=>{
        writes.push(db.collection("usuarios").doc(uid).collection("fichas").doc(id).set(data));
      });
      Object.entries(backup.plantasPersonalizadas||{}).forEach(([id,data])=>{
        writes.push(db.collection("usuarios").doc(uid).collection("plantasPersonalizadas").doc(id).set(data));
      });
      Object.entries(backup.riego||{}).forEach(([id,data])=>{
        writes.push(db.collection("usuarios").doc(uid).collection("riego").doc(id).set(data));
      });
      Object.entries(backup.diario||{}).forEach(([plantId,entries])=>{
        Object.entries(entries).forEach(([entryId,data])=>{
          writes.push(db.collection("usuarios").doc(uid).collection("diario").doc(plantId).collection("entries").doc(entryId).set(data));
        });
      });
      if(isAdmin() && backup.oficial){
        Object.entries(backup.oficial.plantasOficiales||{}).forEach(([id,data])=>{
          writes.push(db.collection("plantasOficiales").doc(id).set(data));
        });
        Object.entries(backup.oficial.plagas||{}).forEach(([id,data])=>{
          writes.push(db.collection("plagas").doc(id).set(data));
        });

function recompressDataUrl(dataUrl, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.onerror = ()=> reject(new Error("No se ha podido procesar la imagen."));
    img.onload = ()=>{
      let w = img.naturalWidth, h = img.naturalHeight;
      if(w > maxDim || h > maxDim){
        if(w >= h){ h = Math.round(h * maxDim / w); w = maxDim; }
        else { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.src = dataUrl;
  });
}

function wateringFreqDays(p){
  const active = isActiveSeason(p);
  const text = active ? p.riegoFrecuencia.primaveraVerano : p.riegoFrecuencia.otoñoInvierno;
  const nums = (text||"").match(/\d+/g);
  if(!nums) return 10;
  return nums.length>1 ? (parseInt(nums[0])+parseInt(nums[1]))/2 : parseInt(nums[0]);
}

  const remaining = freq - daysSince;
  if(remaining<=0) return {level:"now", days:remaining};
  if(remaining<=2) return {level:"soon", days:remaining};
  return {level:"ok", days:remaining};
}
/* --- Fertilización/trasplante: frecuencia a partir del texto de la ficha (Abono/Trasplante) --- */
function stripHtml(html){
  const div = document.createElement("div");
  div.innerHTML = html || "";
  return div.textContent || div.innerText || "";
}
function parseFreqDaysFromText(text){
  if(!text) return null;
  const t = text.toLowerCase();
  let m = t.match(/cada\s+(\d+)(?:[-–](\d+))?\s*semana/);
  if(m){ const a=parseInt(m[1]), b=m[2]?parseInt(m[2]):a; return ((a+b)/2)*7; }
  m = t.match(/cada\s+(\d+)(?:[-–](\d+))?\s*mes/);
  if(m){ const a=parseInt(m[1]), b=m[2]?parseInt(m[2]):a; return ((a+b)/2)*30; }
  if(/mensual/.test(t)) return 30;
  m = t.match(/cada\s+(\d+)(?:[-–](\d+))?\s*d[ií]a/);
  if(m){ const a=parseInt(m[1]), b=m[2]?parseInt(m[2]):a; return (a+b)/2; }
  m = t.match(/cada\s+(\d+)(?:[-–](\d+))?\s*a[ñn]o/);
  if(m){ const a=parseInt(m[1]), b=m[2]?parseInt(m[2]):a; return ((a+b)/2)*365; }
  if(/una vez al a[ñn]o|anual/.test(t)) return 365;
  if(/1-2 veces por temporada|1-2 veces/.test(t)) return 90;
  return null;
}

/* --- Previsiones automáticas de abonado/trasplante para el calendario --- */
function isoToLocalDate(iso){
  const [y,m,d] = iso.split("-").map(Number);
  return new Date(y, m-1, d);
}
function localDateToISO(date){
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,"0");
  const d = String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
function occurrenceAt(anchorDate, freqDays, k){
  const d = new Date(anchorDate);
  d.setDate(d.getDate() + Math.round(freqDays*k));
  return d;
}
function predictedOccurrencesInRange(anchorISO, freqDays, rangeStartISO, rangeEndISO){
  const anchor = isoToLocalDate(anchorISO);
  const rangeStart = isoToLocalDate(rangeStartISO);
  const rangeEnd = isoToLocalDate(rangeEndISO);
  const results = [];
  let k = 1;
  let occ = occurrenceAt(anchor, freqDays, k);
  if(occ < rangeStart){
    const diffDays = Math.floor((rangeStart - anchor)/86400000);
    k = Math.max(1, Math.floor(diffDays/freqDays));
    occ = occurrenceAt(anchor, freqDays, k);
  }
  let guard = 0;
  while(occ <= rangeEnd && guard < 500){
    if(occ >= rangeStart) results.push(localDateToISO(occ));
    k++;
    occ = occurrenceAt(anchor, freqDays, k);
    guard++;
  }
  return results;
}
function getPredictedEventsForMonth(year, month){
  const rangeStartISO = `${year}-${String(month+1).padStart(2,"0")}-01`;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const rangeEndISO = `${year}-${String(month+1).padStart(2,"0")}-${String(daysInMonth).padStart(2,"0")}`;
  const out = [];
  allPlants().filter(p=>!isArchived(p.id)).forEach(p=>{
    const abonoFreq = abonoFreqDays(p);
    if(abonoFreq){
      const anchor = lastTaggedISO(p,"abonado") || p.fechaAlta;
      predictedOccurrencesInRange(anchor, abonoFreq, rangeStartISO, rangeEndISO).forEach(fechaISO=>{
        out.push({fechaISO, plantId:p.id, plantName:p.nombreComun, tipo:"abonado"});
      });
    }
    const trasplanteFreq = trasplanteFreqDays(p);
    if(trasplanteFreq){
      const anchor = lastTaggedISO(p,"trasplantado") || p.fechaAlta;
      predictedOccurrencesInRange(anchor, trasplanteFreq, rangeStartISO, rangeEndISO).forEach(fechaISO=>{
        out.push({fechaISO, plantId:p.id, plantName:p.nombreComun, tipo:"trasplantado"});
      });
    }
  });
  return out;
}

function renderAuthLoading(){

function isEditingActiveTextField(root){
  const el = document.activeElement;
  if(!el || !root.contains(el)) return false;
  if(el.isContentEditable) return true;
  if(el.tagName==="TEXTAREA") return true;
  if(el.tagName==="INPUT" && (el.type==="text" || el.type==="search")) return true;
  return false;
}
function renderApp(){
  const root = document.getElementById("app");
  if(isEditingActiveTextField(root)) return;
  if(!authReady){ root.innerHTML = renderAuthLoading(); return; }
  if(!currentUser){ root.innerHTML = renderLogin(); bindLoginEvents(); return; }
  if(currentView.screen==="garden"){ root.innerHTML = renderGarden(); bindGardenEvents(); }
  else if(currentView.screen==="calendar"){ root.innerHTML = renderCalendarView(); bindCalendarEvents(); }
  else if(currentView.screen==="riego"){ root.innerHTML = renderRiegoChecklist(); bindRiegoChecklistEvents(); }
  else if(currentView.screen==="revision"){ root.innerHTML = renderRevision(); bindRevisionEvents(); }
  else if(currentView.screen==="addPlant"){ root.innerHTML = renderAddPlant(); bindAddPlantEvents(); }
  else if(currentView.screen==="refList"){ root.innerHTML = renderRefList(); bindRefListEvents(); }
  else if(currentView.screen==="refDetail"){ root.innerHTML = renderRefDetail(); bindRefDetailEvents(); }
  else { root.innerHTML = renderDetail(allPlants().find(p=>p.id===currentView.plantId)); bindDetailEvents(); }
}
function render(){ renderApp(); }

function renderGarden(){
  let list = allPlants().filter(p=>{
    const q = currentView.search.toLowerCase();
    return !q || p.nombreComun.toLowerCase().includes(q) || p.nombreCientifico.toLowerCase().includes(q);
  }).filter(p=> !isArchived(p.id));
  if(currentView.sort==="az") list.sort((a,b)=>a.nombreComun.localeCompare(b.nombreComun));
  if(currentView.sort==="riego") list.sort((a,b)=>{ const sa=wateringStatus(a), sb=wateringStatus(b); const o={now:0,soon:1,ok:2}; return o[sa.level]-o[sb.level]; });
  if(currentView.sort==="reciente") list.sort((a,b)=> b.fechaAlta.localeCompare(a.fechaAlta));
  if(currentView.sort==="grupo") list.sort((a,b)=> (a.grupo+a.nombreComun).localeCompare(b.grupo+b.nombreComun));
  if(currentView.sort==="familia") list.sort((a,b)=> (a.familia||"").localeCompare(b.familia||"") || a.nombreComun.localeCompare(b.nombreComun));

  const porFamilia = currentView.sort==="familia";
  const grupos = porFamilia
    ? Array.from(new Set(list.map(p=>p.familia||"Sin familia")))
        .sort((a,b)=> a==="Sin familia" ? 1 : b==="Sin familia" ? -1 : a.localeCompare(b))
        .map(fam=>({label: fam, plantas: list.filter(p=>(p.familia||"Sin familia")===fam)}))
    : GRUPO_OPTIONS.map(g=>({...g, plantas: list.filter(p=>p.grupo===g.value)}));
  const archivadas = allPlants().filter(p=>isArchived(p.id)).sort((a,b)=>a.nombreComun.localeCompare(b.nombreComun));

  function cardsFor(arr){
    return arr.map(p=>{
      const fs = fertilizingStatus(p);
      return `<div class="card" data-id="${p.id}">
        ${fs.level==="now" ? `<span class="fert-badge" title="Toca abonar">🍃</span>` : ""}
        ${renderPlantVisual(p)}
        <div class="name">${p.nombreComun}</div>
        ${p.nombreCientifico ? `<div class="sci">${p.nombreCientifico}</div>` : ""}
        <div class="card-actions">
          <button class="icon-btn icon-only archivar-card-btn" data-id="${p.id}" title="Ocultar" aria-label="Ocultar">🙈</button>
        </div>
      </div>`;
    }).join("");
  }

  function archivedCardsFor(arr){
    return arr.map(p=>`<div class="card" data-id="${p.id}" style="opacity:.7">
      ${renderPlantVisual(p)}
      <div class="name">${p.nombreComun}</div>
      ${p.nombreCientifico ? `<div class="sci">${p.nombreCientifico}</div>` : ""}
      <button class="icon-btn reactivar-btn" data-id="${p.id}">👁️ Mostrar</button>
    </div>`).join("");
  }

  return `
    <div class="topbar">
      <div class="brand">
        <div><h1>l'HortApp</h1><span>${allPlants().length} plantas · tu cuaderno personal</span></div>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="icon-btn icon-only" id="add-plant-nav" title="Añadir planta" aria-label="Añadir planta">🌱</button>
        <button class="icon-btn icon-only" id="cal-nav" title="Calendario" aria-label="Calendario">📅</button>
        <button class="icon-btn icon-only" id="riego-nav" title="Riego" aria-label="Riego">💧</button>
        <button class="icon-btn icon-only" id="plagas-nav" title="Plagas y enfermedades" aria-label="Plagas y enfermedades">🐛</button>
        <button class="icon-btn icon-only" id="tratamientos-nav" title="Tratamientos" aria-label="Tratamientos">💊</button>
        ${isAdmin() ? `<button class="icon-btn icon-only" id="revision-nav" title="Plantas de usuarios" aria-label="Plantas de usuarios">📋</button>` : ""}
        <button class="icon-btn icon-only" id="export-data" title="Exportar mis datos" aria-label="Exportar mis datos">⬇️</button>
        <button class="icon-btn icon-only" id="import-data" title="Importar mis datos" aria-label="Importar mis datos">⬆️</button>
        ${hasLegacyLocalData() ? `<button class="icon-btn icon-only" id="migrate-btn" title="Subir mis datos de este dispositivo" aria-label="Subir mis datos de este dispositivo">☁️</button>` : ""}
        <button class="icon-btn icon-only" id="signout-btn" title="Cerrar sesión" aria-label="Cerrar sesión">🚪</button>
        <input type="file" id="import-file" accept="application/json" class="hidden">
      </div>
    </div>
    <div class="toolbar">
      <input type="search" id="search" placeholder="Buscar planta..." value="${currentView.search}">
      <select id="sort">
        <option value="az" ${currentView.sort==="az"?"selected":""}>Alfabético</option>
        <option value="riego" ${currentView.sort==="riego"?"selected":""}>Toca regar antes</option>
        <option value="reciente" ${currentView.sort==="reciente"?"selected":""}>Más reciente</option>
        <option value="grupo" ${currentView.sort==="grupo"?"selected":""}>Por grupo</option>
        <option value="familia" ${currentView.sort==="familia"?"selected":""}>Por familia</option>
      </select>
    </div>
    ${list.length===0 ? `<div class="no-results">No hay ninguna planta que coincida con tu búsqueda.</div>` : `
      ${grupos.map(g=> g.plantas.length>0 ? `<div class="section-label">${g.label}</div><div class="grid">${cardsFor(g.plantas)}</div>` : "").join("")}
    `}
    ${archivadas.length>0 ? `
      <div class="section-label" id="archived-toggle" style="cursor:pointer; user-select:none;">${currentView.archivedOpen?"▾":"▸"} Ocultas (${archivadas.length})</div>
      ${currentView.archivedOpen ? `<div class="grid">${archivedCardsFor(archivadas)}</div>` : ""}
    ` : ""}
  `;
}

  document.getElementById("search").addEventListener("input", e=>{ currentView.search=e.target.value; renderApp(); });

  document.querySelectorAll(".card").forEach(el=>{

    });

  const migrateBtn = document.getElementById("migrate-btn");

}

let reviewPlants = [];
let reviewLoaded = false;
let reviewOpenId = null;
let reviewPendingPhotos = {};
function loadReviewPlants(){
  if(!fb || !isAdmin()) return;
  firebase.firestore().collectionGroup("plantasPersonalizadas").get().then(snap=>{
    reviewPlants = snap.docs.map(doc=>({ id: doc.id, ownerUid: doc.ref.parent.parent.id, ...doc.data() })).filter(p=>p.solicitudPublicacion);
    reviewLoaded = true;
    renderApp();
  }).catch(()=>{ reviewPlants = []; reviewLoaded = true; renderApp(); });
}
function publishCustomPlant(ownerUid, plantId){
  if(!confirm("¿Publicar esta planta como oficial? A partir de ahora será visible para todos y solo tú podrás editarla.")) return;
  const ownerDoc = firebase.firestore().collection("usuarios").doc(ownerUid).collection("plantasPersonalizadas").doc(plantId);
  ownerDoc.get().then(doc=>{
    if(!doc.exists){ alert("Esta planta ya no existe (puede que se haya borrado)."); return; }
    const data = { ...doc.data(), ...(reviewPendingPhotos[plantId]||{}) };
    delete data.misNotas;
    delete data.solicitudPublicacion;
    return firebase.firestore().collection("plantasOficiales").doc(plantId).set(data)
      .then(()=> ownerDoc.delete());
  }).then(()=>{
    delete reviewPendingPhotos[plantId];
    if(reviewOpenId===plantId) reviewOpenId = null;
    alert("Planta publicada como oficial.");
    loadReviewPlants();
  }).catch(err=>{
    alert("No se ha podido publicar: " + (err.message || err));
  });
}
function renderReviewFichaContent(datos){
  const sections = FICHA_FIELDS.filter(f=>f.key!=="misNotas").map(f=>{
    if(!fieldHasContent(f, datos)) return "";
    return `
      <div class="section">
        <h4>${f.label}</h4>
        ${f.special==="clima" ? renderClimaSectionView(datos) : f.key==="descripcion" ? `
          ${renderDescripcionPhotoView(datos)}
          ${datos.descripcion ? `<div class="section-view">${datos.descripcion}</div>` : ""}
        ` : `<div class="section-view">${datos[f.key]}</div>`}
      </div>
    `;
  }).join("");
  return sections || `<p class="empty-diary">Esta ficha está vacía.</p>`;
}

                  <div>
                    <div class="familia-label" style="margin-bottom:4px;">Foto de portada</div>
                    <div class="section-photo-row">
                      ${foto ? `<img src="${foto}" alt="Foto de portada" class="section-photo">` : ""}
                      <div class="section-photo-actions">
                        <button type="button" class="icon-btn icon-only review-portada-btn" data-id="${p.id}" title="${foto ? "Cambiar" : "Subir"}" aria-label="Foto de portada">📷</button>
                      </div>

/* =========================================================
   Listas de referencia: Plagas y enfermedades / Tratamientos
   Catálogos compartidos de solo lectura para todos, editables solo por la administradora.
   ========================================================= */
const REFERENCE_LISTS = {
  plagas: { titulo: "Plagas y enfermedades", singular: "plaga o enfermedad" },
  tratamientos: { titulo: "Tratamientos", singular: "tratamiento" },
};
function getRefCache(type){ return type==="plagas" ? plagasData : tratamientosData; }
function saveRefField(type, id, key, value){
  if(!isAdmin()) return;
  const current = getRefCache(type)[id] || {};
  const updated = {...current, [key]: value};
  if(type==="plagas") plagasData = {...plagasData, [id]: updated};
  else tratamientosData = {...tratamientosData, [id]: updated};
  if(fb){ firebase.firestore().collection(type).doc(id).set({[key]:value}, {merge:true}).catch(()=>{}); }
}
function deleteRefItem(type, id){
  if(!isAdmin()) return;
  const next = {...getRefCache(type)};
  delete next[id];
  if(type==="plagas") plagasData = next; else tratamientosData = next;
  if(fb){ firebase.firestore().collection(type).doc(id).delete().catch(()=>{}); }
}
function renderRefList(){
  const type = currentView.refType;
  const cfg = REFERENCE_LISTS[type];
  const cache = getRefCache(type);
  const items = Object.keys(cache).map(id=>({id, ...cache[id]})).sort((a,b)=> (a.nombre||"").localeCompare(b.nombre||""));
  return `
    <div class="topbar">
      <button class="icon-btn" id="back">← Jardín</button>
      <div><h1 style="font-size:1.3rem;">${cfg.titulo}</h1></div>
    </div>
    ${isAdmin() ? `
      <div class="diary-form" style="margin-bottom:16px;">
        <input type="text" id="new-ref-name" placeholder="Nombre de ${cfg.singular} nueva">
        <button class="save" id="add-ref-btn">Añadir</button>
      </div>
    ` : ""}
    ${items.length===0 ? `<p class="empty-diary">Todavía no hay ninguna entrada.</p>` : `
      <div class="riego-list">
        ${items.map(it=>`
          <div class="riego-row ref-row" data-id="${it.id}" style="cursor:pointer;">
            <div class="riego-name">${escapeHtml(it.nombre||"(sin nombre)")}</div>
          </div>
        `).join("")}
      </div>
    `}
  `;
}

function fieldHasContent(f, datos){
  if(f.special==="clima") return CLIMA_KEYS.some(k=>datos[k]);
  if(f.key==="descripcion") return !!datos.descripcion || !!datos.descripcionFoto;

}
function renderFicha(p){
  const datos = getFicha(p.id);
  const campos = FICHA_FIELDS.filter(f=> f.key!=="misNotas" || !isCustomPlant(p.id));
  const hasAnyContent = campos.some(f=> fieldHasContent(f, datos));
  const sections = campos.map(f=>{
    const editable = currentView.editMode && canEditField(f, p);
    if(editable){
      return `
        <div class="section">
          <h4>${f.label}</h4>
          ${f.special==="clima" ? renderClimaSectionEdit(datos) : f.key==="descripcion" ? `
            ${isAdmin() ? renderDescripcionPhotoEdit(datos) : renderDescripcionPhotoView(datos)}
            ${richToolbarHtml(`rf-${f.key}`)}
            <div class="rich-editable" contenteditable="true" data-key="${f.key}" id="rf-${f.key}" data-placeholder="Aún no has escrito nada aquí. Ve añadiendo tus notas cuando quieras.">${datos[f.key]||""}</div>
          ` : `
            ${richToolbarHtml(`rf-${f.key}`)}
            <div class="rich-editable" contenteditable="true" data-key="${f.key}" id="rf-${f.key}" data-placeholder="Aún no has escrito nada aquí. Ve añadiendo tus notas cuando quieras.">${datos[f.key]||""}</div>
          `}
        </div>
      `;
    }
    if(!fieldHasContent(f, datos)) return "";
    return `
      <div class="section">
        <h4>${f.label}</h4>
        ${f.special==="clima" ? renderClimaSectionView(datos) : f.key==="descripcion" ? `
          ${renderDescripcionPhotoView(datos)}
          ${datos.descripcion ? `<div class="section-view">${datos.descripcion}</div>` : ""}
        ` : `<div class="section-view">${datos[f.key]}</div>`}
      </div>
    `;
  }).join("");
  return `
    <input type="file" id="descripcion-foto-file" accept="${PHOTO_ACCEPT}" class="hidden">
    <div class="sections">
      ${sections}
      ${(!currentView.editMode && !hasAnyContent) ? `<p class="empty-diary">Esta ficha está vacía. Pulsa "Editar" arriba para empezar a rellenarla.</p>` : ""}
    </div>
  `;
}

function renderDiario(p){

function bindDetailEvents(){
  document.getElementById("back").addEventListener("click", ()=>{ currentView.screen="garden"; renderApp(); });
  document.getElementById("print-btn").addEventListener("click", (e)=>{
    e.target.blur();
    setTimeout(()=> window.print(), 0);
  });
  document.getElementById("archive-btn").addEventListener("click", ()=>{
    setArchived(currentView.plantId, !isArchived(currentView.plantId));
    renderApp();
  });
  const solicitarBtn = document.getElementById("solicitar-publicacion-btn");
  if(solicitarBtn){
    solicitarBtn.addEventListener("click", ()=>{
      saveFichaField(currentView.plantId, "solicitudPublicacion", true);
      renderApp();
    });
  }
  const cancelarSolicitudBtn = document.getElementById("cancelar-solicitud-btn");
  if(cancelarSolicitudBtn){
    cancelarSolicitudBtn.addEventListener("click", ()=>{
      saveFichaField(currentView.plantId, "solicitudPublicacion", false);
      renderApp();
    });
  }
  const editToggleBtn = document.getElementById("edit-toggle-btn");
  if(editToggleBtn){
    editToggleBtn.addEventListener("click", ()=>{ currentView.editMode = !currentView.editMode; renderApp(); });
  }
  const deleteFichaBtn = document.getElementById("delete-ficha-btn");
  if(deleteFichaBtn){
    deleteFichaBtn.addEventListener("click", ()=>{
      if(confirm("Esto eliminará esta planta por completo de la aplicación: su ficha, su diario, sus riegos y cualquier entrada suya en el calendario. Será como si nunca hubiera existido en la app. Esta acción no se puede deshacer. ¿Continuar?")){
        deletePlantCompletely(currentView.plantId);
        currentView.screen="garden";
        renderApp();
      }
    });
  }
  if(currentView.tab==="ficha" && currentView.editMode){
    const editNombreComun = document.getElementById("edit-nombreComun");
    if(editNombreComun) editNombreComun.addEventListener("input", (e)=>{ saveFichaField(currentView.plantId, "nombreComun", e.target.value); });
    const editNombreCientifico = document.getElementById("edit-nombreCientifico");
    if(editNombreCientifico) bindPlainTextEditable(editNombreCientifico, (val)=> saveFichaField(currentView.plantId, "nombreCientifico", val));
    const editFamilia = document.getElementById("edit-familia");
    if(editFamilia) bindPlainTextEditable(editFamilia, (val)=> saveFichaField(currentView.plantId, "familia", val));
    document.getElementById("edit-grupo").addEventListener("change", (e)=>{ saveFichaField(currentView.plantId, "grupoUbicacion", e.target.value); });
    const portadaFotoBtn = document.getElementById("portada-foto-btn");
    const portadaFotoFile = document.getElementById("portada-foto-file");
    if(portadaFotoBtn){
      portadaFotoBtn.addEventListener("click", ()=> portadaFotoFile.click());
      portadaFotoFile.addEventListener("change", (e)=>{
        const file = e.target.files[0];
        e.target.value = "";
        if(!file) return;
        const plantId = currentView.plantId;
        readImageCompressed(file, 900, 0.75).then(dataUrl=>{
          saveFichaPhoto(plantId, "fotoPortada", dataUrl);
          renderApp();
        }).catch(err=>{
          alert(err.message || "No se ha podido procesar la imagen.");
        });
      });
    }
    const portadaFotoQuitarBtn = document.getElementById("portada-foto-quitar-btn");
    if(portadaFotoQuitarBtn){
      portadaFotoQuitarBtn.addEventListener("click", ()=>{
        if(confirm("¿Quitar la foto de portada de esta planta?")){
          saveFichaField(currentView.plantId, "fotoPortada", "");
          renderApp();
        }
      });
    }
    const descripcionFotoBtn = document.getElementById("descripcion-foto-btn");
    const descripcionFotoFile = document.getElementById("descripcion-foto-file");
    if(descripcionFotoBtn){
      descripcionFotoBtn.addEventListener("click", ()=> descripcionFotoFile.click());
      descripcionFotoFile.addEventListener("change", (e)=>{
        const file = e.target.files[0];
        e.target.value = "";
        if(!file) return;
        const plantId = currentView.plantId;
        readImageCompressed(file, 900, 0.75).then(dataUrl=>{
          saveFichaPhoto(plantId, "descripcionFoto", dataUrl);
          renderApp();
        }).catch(err=>{
          alert(err.message || "No se ha podido procesar la imagen.");
        });
      });
    }
    const descripcionFotoQuitarBtn = document.getElementById("descripcion-foto-quitar-btn");
    if(descripcionFotoQuitarBtn){
      descripcionFotoQuitarBtn.addEventListener("click", ()=>{
        if(confirm("¿Quitar la foto de este apartado?")){
          saveFichaField(currentView.plantId, "descripcionFoto", "");
          renderApp();
        }
      });
    }
  }
  document.querySelectorAll(".tab").forEach(el=> el.addEventListener("click", ()=>{ currentView.tab=el.dataset.tab; renderApp(); }));

  if(currentView.tab==="ficha"){
    if(currentView.editMode){
      document.querySelectorAll(".rich-editable[data-key]").forEach(el=>{
        el.addEventListener("input", ()=>{ saveFichaField(currentView.plantId, el.dataset.key, el.innerHTML); });
      });
      document.querySelectorAll(".clima-input[data-key]").forEach(el=>{
        el.addEventListener("input", ()=>{ saveFichaField(currentView.plantId, el.dataset.key, el.value); });
      });
      bindRichToolbars(document);
    }
    document.querySelectorAll(".marker").forEach(el=>{
      el.addEventListener("click", (ev)=>{
        ev.stopPropagation();
        const p = allPlants().find(pl=>pl.id===currentView.plantId);
        const m = p.marcadores[el.dataset.idx];
        const existing = document.querySelector(".marker-card"); if(existing) existing.remove();
        const card = document.createElement("div");
        card.className="marker-card"; card.style.left=`calc(${m.x}% + 14px)`; card.style.top=`calc(${m.y}% + 14px)`;
        card.innerHTML = `<b>${m.titulo}</b><br>${m.detalle}`;
        document.getElementById("illu-wrap").appendChild(card);
        setTimeout(()=>document.addEventListener("click", function h(){ card.remove(); document.removeEventListener("click",h); }, {once:true}), 0);
      });
    });
  }
  if(currentView.tab==="diario"){
    let selectedTags = [];
    const diaryPendingPhotos = [];
    document.querySelectorAll(".tag-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const t=btn.dataset.tag;
        if(selectedTags.includes(t)){ selectedTags=selectedTags.filter(x=>x!==t); btn.classList.remove("selected"); }
        else { selectedTags.push(t); btn.classList.add("selected"); }
      });
    });
    bindRichToolbars(document);
    bindPhotoPicker("diary", diaryPendingPhotos);
    document.getElementById("save-entry").addEventListener("click", ()=>{
      const box = document.getElementById("diary-text");
      const html = box.innerHTML;
      const plain = box.textContent.trim();
      if(!plain && selectedTags.length===0 && diaryPendingPhotos.length===0) return;
      const now = new Date();
      addDiaryEntry(currentView.plantId, {fecha: now.toLocaleDateString("es-ES"), fechaISO: now.toISOString().slice(0,10), texto:html, tags:selectedTags, fotos: diaryPendingPhotos.slice()});
      renderApp();
    });
    document.querySelectorAll(".entry .del").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        deleteDiaryEntry(currentView.plantId, btn.dataset.entryId);
        renderApp();
      });
    });
    document.querySelectorAll(".entry-photo-thumb").forEach(img=>{
      img.addEventListener("click", ()=> openPhotoLightbox(img.src));
    });
  }
}

}
function bindAddPlantEvents(){
  document.getElementById("back-add").addEventListener("click", ()=>{ currentView.screen="garden"; renderApp(); });
  let fotoBase64 = null;
  const newPlantPhoto = document.getElementById("new-plant-photo");
  if(newPlantPhoto){
    newPlantPhoto.addEventListener("change", (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        fotoBase64 = reader.result;
        document.getElementById("new-plant-preview").innerHTML = `<img src="${fotoBase64}" style="max-width:160px; border-radius:10px; display:block; margin-top:6px;">`;
      };
      reader.readAsDataURL(file);
    });
  }
  document.getElementById("save-new-plant").addEventListener("click", ()=>{
    const name = document.getElementById("new-plant-name").value.trim();
    if(!name){ alert("Escribe un nombre para la planta."); return; }
    const plant = addCustomPlant(name, fotoBase64);
    currentView.screen="detail"; currentView.plantId=plant.id; currentView.tab="ficha"; currentView.editMode=false;
    renderApp();
  });
}

/* =========================================================
   Calendario
   ========================================================= */
function renderCalendarView(){
  const year = currentView.calYear, month = currentView.calMonth;
  const first = new Date(year, month, 1);
  const startOffset = (first.getDay()+6)%7; // lunes=0
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthName = first.toLocaleDateString("es-ES", {month:"long", year:"numeric"});
  const todayISO = new Date().toISOString().slice(0,10);

  const allEntries = getAllEntries();
  const byDay = {};
  allEntries.forEach(e=>{ if(e.fechaISO){ (byDay[e.fechaISO] = byDay[e.fechaISO]||[]).push(e); } });

  const predictedEvents = getPredictedEventsForMonth(year, month);
  const predictedByDay = {};
  predictedEvents.forEach(e=>{ (predictedByDay[e.fechaISO] = predictedByDay[e.fechaISO]||[]).push(e); });

  let cells = "";
  for(let i=0;i<startOffset;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const iso = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dayEntries = byDay[iso] || [];
    const dayPredicted = predictedByDay[iso] || [];
    const dots = dayEntries.slice(0,5).map(e=>{
      const tag = (e.tags && e.tags[0]) || "tratamiento";
      return `<span class="cal-dot" style="background:${TAG_COLORS[tag]||'#999'}"></span>`;
    }).join("");
    const predictedDots = dayPredicted.slice(0,5).map(e=>{
      return `<span class="cal-dot cal-dot-predicted" style="border-color:${TAG_COLORS[e.tipo]||'#999'}"></span>`;
    }).join("");
    const isSelected = currentView.calSelected===iso;
    const isToday = iso===todayISO;
    cells += `<div class="cal-cell ${(dayEntries.length||dayPredicted.length)?'has-entries':''} ${isSelected?'selected':''} ${isToday?'today':''}" data-iso="${iso}"><span class="cal-day-num">${d}</span><div class="cal-dots">${dots}${predictedDots}</div></div>`;
  }

  const selectedEntries = currentView.calSelected ? (byDay[currentView.calSelected]||[]) : [];
  const selectedPredicted = currentView.calSelected ? (predictedByDay[currentView.calSelected]||[]) : [];
  const selectedDateLabel = currentView.calSelected ? new Date(currentView.calSelected+"T00:00:00").toLocaleDateString("es-ES",{day:"numeric",month:"long",year:"numeric"}) : "";

  const activePlants = allPlants().filter(p=>!isArchived(p.id));
  const grupoOpts = GRUPO_OPTIONS.map(g=>({...g, plantas: activePlants.filter(p=>p.grupo===g.value).sort((a,b)=>a.nombreComun.localeCompare(b.nombreComun))}));

  return `
    <div class="topbar">
      <button class="icon-btn" id="back-cal">← Jardín</button>
      <h1 style="font-size:1.2rem; text-transform:capitalize; margin:0;">${monthName}</h1>
      <div style="display:flex; gap:6px;">
        <button class="icon-btn" id="cal-prev">←</button>
        <button class="icon-btn" id="cal-next">→</button>
      </div>
    </div>
    <div class="cal-legend">
      ${Object.entries(TAG_COLORS).map(([tag,color])=>`<span><span class="dot" style="background:${color}"></span>${tag}</span>`).join("")}
      <span><span class="dot" style="background:none; border:2px solid var(--ink-soft); box-sizing:border-box;"></span>previsto (abono/trasplante, aún sin registrar)</span>
    </div>
    <div class="cal-grid">
      ${["L","M","X","J","V","S","D"].map(d=>`<div class="cal-head">${d}</div>`).join("")}
      ${cells}
    </div>
    <div class="cal-day-detail">
      ${currentView.calSelected ? `
        <h4>${selectedDateLabel}</h4>
        <div class="diary-form" id="cal-entry-form">
          <select id="cal-plant-select">
            <option value="">Selecciona una planta…</option>
            ${grupoOpts.map(g=> g.plantas.length ? `<optgroup label="${g.label}">${g.plantas.map(p=>`<option value="${p.id}">${p.nombreComun}</option>`).join("")}</optgroup>` : "").join("")}
          </select>
          <div class="tag-row" id="cal-tag-row">${DIARY_TAGS.map(t=>`<button type="button" class="tag-btn" data-tag="${t}">${t}</button>`).join("")}</div>
          ${richToolbarHtml("cal-entry-text")}
          <div class="rich-editable" contenteditable="true" id="cal-entry-text" data-placeholder="Notas (opcional)"></div>
          ${photoPickerHtml("cal")}
          <button class="save" id="cal-save-entry">Guardar</button>
        </div>
        ${selectedPredicted.length>0 ? selectedPredicted.map(e=>`
          <div class="entry predicted"><div class="meta"><b>${e.plantName}</b> <span class="entry-tag" style="border:1px solid ${TAG_COLORS[e.tipo]}; color:${TAG_COLORS[e.tipo]}; background:none;">previsto: ${e.tipo}</span></div></div>
        `).join("") : ""}
        ${selectedEntries.length===0 ? (selectedPredicted.length===0 ? `<p class="empty-diary">Sin entradas este día.</p>` : "") : selectedEntries.map(e=>`
          <div class="entry"><div class="meta"><b>${e.plantName}</b> ${e.tags.map(t=>`<span class="entry-tag">${t}</span>`).join("")}<button class="del" data-plant="${e.plantId}" data-entry-id="${e.entryId}">borrar</button></div><div class="txt">${e.texto||""}</div>${entryPhotosHtml(e)}</div>
        `).join("")}
      ` : `<p class="empty-diary">Toca un día para ver el detalle de las entradas.</p>`}
    </div>
  `;
}

function bindCalendarEvents(){
  document.getElementById("back-cal").addEventListener("click", ()=>{ currentView.screen="garden"; renderApp(); });
  document.getElementById("cal-prev").addEventListener("click", ()=>{
    currentView.calMonth--; if(currentView.calMonth<0){ currentView.calMonth=11; currentView.calYear--; }
    currentView.calSelected=null; renderApp();
  });
  document.getElementById("cal-next").addEventListener("click", ()=>{
    currentView.calMonth++; if(currentView.calMonth>11){ currentView.calMonth=0; currentView.calYear++; }
    currentView.calSelected=null; renderApp();
  });
  document.querySelectorAll(".cal-cell[data-iso]").forEach(el=>{
    el.addEventListener("click", ()=>{ currentView.calSelected = el.dataset.iso; renderApp(); });
  });
  if(currentView.calSelected){
    let selectedTags = [];
    const calPendingPhotos = [];
    document.querySelectorAll("#cal-tag-row .tag-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const t = btn.dataset.tag;
        if(selectedTags.includes(t)){ selectedTags=selectedTags.filter(x=>x!==t); btn.classList.remove("selected"); }
        else { selectedTags.push(t); btn.classList.add("selected"); }
      });
    });
    bindRichToolbars(document);
    bindPhotoPicker("cal", calPendingPhotos);
    document.getElementById("cal-save-entry").addEventListener("click", ()=>{
      const plantId = document.getElementById("cal-plant-select").value;
      const box = document.getElementById("cal-entry-text");
      const html = box.innerHTML;
      const plain = box.textContent.trim();
      if(!plantId){ alert("Selecciona primero a qué planta se refiere."); return; }
      if(!plain && selectedTags.length===0 && calPendingPhotos.length===0) return;
      const iso = currentView.calSelected;
      addDiaryEntry(plantId, {fecha: new Date(iso+"T00:00:00").toLocaleDateString("es-ES"), fechaISO: iso, texto:html, tags:selectedTags, fotos: calPendingPhotos.slice()});
      if(selectedTags.includes("regado")){ saveRiego(plantId, iso); }
      renderApp();
    });
    document.querySelectorAll(".entry-photo-thumb").forEach(img=>{
      img.addEventListener("click", ()=> openPhotoLightbox(img.src));
    });
    document.querySelectorAll(".cal-day-detail .del").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        deleteDiaryEntry(btn.dataset.plant, btn.dataset.entryId);
        renderApp();
      });
    });
  }
}
